name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - name: Type check
        run: npx tsc --noEmit

  # Railway deploys automatically on push to main via its GitHub integration.
  # This job just validates the build succeeds before Railway picks it up.
  build-check:
    name: Build check
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/tidetracker_test"
      NEXTAUTH_SECRET: "ci-test-secret-not-real"
      NEXTAUTH_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - run: npm run build
